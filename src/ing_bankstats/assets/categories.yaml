# Category rules for ING Bank transaction categorisation.
#
# How matching works:
#   - Each transaction's merchant + reference text is searched (case-insensitive).
#   - Categories HIGHER in this file take priority when a transaction matches
#     multiple categories (e.g. "uber eats" matches both dining and travel,
#     but dining wins because it appears first).
#   - Keywords are regex-escaped; use plain text, no regex syntax needed.
#   - "other" at the bottom catches everything that doesn't match above.

